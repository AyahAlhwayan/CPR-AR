<!DOCTYPE html>
<html>
  <head>
   <title>CPR AR Trainer - Research Edition (Version B)</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
   <style>
      :root {
       --primary-gradient: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); 
       --accent: #00f2fe;
       --emergency-red: #ff4b2b;
       --success-green: #00ff88;
       --glass: rgba(255, 255, 255, 0.95); 
      }
 
      body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #000; overflow: hidden; }
 
     .emergency-btn {
       position: fixed; top: 20px; right: 20px; z-index: 5000;
       background: var(--emergency-red); color: white; border: none;
        padding: 12px 20px; border-radius: 12px; font-weight: bold;
       box-shadow: 0 0 15px rgba(255, 75, 43, 0.6); cursor: pointer;
        display: none; animation: pulse 1.5s infinite; pointer-events: auto;
      }
 
      @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.05); }
        100% { transform: scale(1); }
      }
 
     .overlay-page {
       position: fixed; top: 0; left: 0; width: 100%; height: 100%;
       background: var(--primary-gradient); z-index: 3000;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        text-align: center; transition: 0.8s ease-in-out;
      }
 
     .glass-card {
       background: var(--glass); backdrop-filter: blur(20px);
       border-radius: 35px; padding: 35px 30px; width: 85%; max-width: 450px;
        border: 1px solid rgba(255,255,255,0.8); 
        box-shadow: 0 15px 35px rgba(0, 10, 30, 0.1);
       position: relative;
       color: #2c3e50; 
      }
      
      .glass-card h1 {
        color: #1e3c72;
        margin-bottom: 5px;
        font-size: 1.8rem;
      }

      .glass-card p.subtitle {
        color: #7f8c8d;
        margin-top: 0;
        font-weight: 500;
        margin-bottom: 20px;
      }
 
      .uni-logo {
       position: absolute; top: 20px; left: 20px; width: 50px; height: auto;
      }
 
     .how-to-use {
       text-align: left; background: #f4f7f6; padding: 20px;
       border-radius: 20px; margin: 20px 0; font-size: 1rem; line-height: 1.6;
       color: #34495e; border: 1px solid #e1e8ed;
      }
     .how-to-use p { margin: 8px 0; }
     .how-to-use b { color: #0072ff; }
 
      .btn-main {
       background: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%);
       color: #fff; padding: 18px 50px; border: none;
       border-radius: 50px; font-weight: bold; font-size: 1.2rem; cursor: pointer;
       transition: 0.3s;
       box-shadow: 0 10px 20px rgba(255, 75, 43, 0.3);
      }
      .btn-main:hover {
        transform: translateY(-3px);
        box-shadow: 0 15px 25px rgba(255, 75, 43, 0.4);
      }
 
      #ar-ui {
       position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        z-index: 1000; display: none; pointer-events: none;
      }
 
     .progress-container {
       position: absolute; top: 30px; left: 50%; transform: translateX(-50%);
        width: 85%; height: 8px; background: rgba(255,255,255,0.2); border-radius: 10px;
      }
 
     #progress-bar {
        width: 7.69%; height: 100%; background: var(--accent);
       border-radius: 10px; transition: 0.8s ease;
      }
 
     .instruction-panel {
       position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
        width: 90%; pointer-events: auto;
      }
 
      .info-box {
       background: rgba(0, 0, 0, 0.85); color: white; padding: 20px;
       border-radius: 25px; border-left: 6px solid var(--accent); margin-bottom: 20px;
      }
 
      .controls { display: flex; gap: 12px; }
      
      .btn-next {
        flex: 3; padding: 20px; border-radius: 50px; border: none;
        color: white; font-weight: bold; background: var(--emergency-red);
       font-size: 1.2rem; cursor: pointer;
      }
 
     #start-cpr-btn {
       background: var(--success-green); color: #000; display: none;
       flex: 3; padding: 20px; border-radius: 50px; border: none;
       font-weight: bold; font-size: 1.2rem; cursor: pointer;
      }
 
      .btn-reset {
        flex: 1; background: #333; color: #fff; border-radius: 50px; border: 1px solid #555;
       font-weight: bold; cursor: pointer;
      }
 
     #cpr-counter {
       font-size: 6rem; color: #ffeb3b; font-weight: 900; display: none;
       text-shadow: 0 0 30px rgba(255,235,59,0.8); text-align: center; margin-bottom: 15px;
      }

      #short-title {
        font-size: 1.6rem; font-weight: bold; margin-top: 5px; color: white; letter-spacing: 1px;
      }
 
     #finish-page { display: none; opacity: 0; }
   </style>
  </head>
 
  <body>
 
    <button id="sos-btn" class="emergency-btn" onclick="window.location.href='tel:112'">CALL 112 📞</button>
 
    <div id="landing-page" class="overlay-page">
      <div class="glass-card">
        <img src="HSA.png" class="uni-logo" alt="Logo">
       <h1>CPR AR MISSION</h1>
       <p class="subtitle">Interactive Training</p>
        
        <div class="how-to-use">
         <p>🔊 <b>Audio:</b> Turn up volume.</p>
         <p>📷 <b>Marker:</b> Aim at <b>HIRO</b>.</p>
         <p>🫀 <b>Pacing:</b> Tap to compress. Stay <b>Green</b>!</p>
       </div>
 
       <button class="btn-main" onclick="initExperience()">START SESSION</button>
     </div>
    </div>
 
    <div id="finish-page" class="overlay-page">
      <div class="glass-card">
        <h1 style="color: #27ae60;">MISSION COMPLETE</h1>
       <p style="margin-bottom: 30px;">You have mastered the CPR cycle effectively.</p>
       <button class="btn-main" onclick="location.reload()">RESTART</button>
     </div>
    </div>
 
    <div id="ar-ui">
      <div class="progress-container"><div id="progress-bar"></div></div>
      <div class="instruction-panel">
        <div id="cpr-counter">0</div>
        <div class="info-box">
         <small id="step-num" style="color: var(--accent); font-weight: bold;">STEP 1 OF 13</small>
         <div id="short-title">AREA SAFE</div> 
       </div>
        <div class="controls">
         <button class="btn-reset" onclick="location.reload()">RESET</button>
         <button id="start-cpr-btn" onclick="startCPR()">START COMPRESSIONS</button>
         <button id="next-btn-text" class="btn-next" onclick="nextStep()">CONTINUE →</button>
       </div>
     </div>
    </div>
 
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
     <a-assets>
        <img id="cpr-hands" src="hands.png">
     </a-assets>
 
     <a-marker preset="hiro" smooth="true" smoothCount="10" smoothTolerance="0.02" smoothThreshold="5">
        
       <a-entity id="group1">
         <a-cone color="#00ff88" radius-bottom="0.2" height="0.6" position="-2.0 1.5 0" rotation="180 0 0" animation="property: position; to: -2.0 1.7 0; dir: alternate; dur: 800; loop: true"></a-cone>
       </a-entity>
 
       <a-entity id="group2" visible="false">
         <a-sphere color="#ffeb3b" radius="0.25" position="-2.0 1.6 -0.4" animation="property: scale; to: 1.3 1.3 1.3; dir: alternate; dur: 400; loop: true"></a-sphere>
       </a-entity>
 
       <a-entity id="group3" visible="false">
         <a-box color="#ff4b2b" position="-2.0 1.5 -0.5" scale="0.3 0.3 0.3" animation="property: rotation; to: 0 360 0; dur: 2000; loop: true"></a-box>
       </a-entity>
 
       <a-entity id="group4" visible="false">
         <a-torus color="#00f2fe" radius="0.2" radius-tubular="0.02" position="-2.0 1.5 -1" rotation="90 0 0"></a-torus>
       </a-entity>
 
       <a-entity id="group5" visible="false">
         <a-cylinder color="#ffeb3b" radius="0.15" height="0.4" position="-2.0 1.5 -0.8" animation="property: position; to: -2.0 1.7 -0.8; dir: alternate; dur: 600; loop: true"></a-cylinder>
       </a-entity>
 
       <a-entity id="group6" visible="false">
         <a-box color="#ff8800" position="-2.0 1.4 -0.6" scale="0.4 0.4 0.4" animation="property: rotation; to: 360 360 0; dur: 3000; loop: true"></a-box>
       </a-entity>
 
       <a-entity id="group7" visible="false">
         <a-sphere color="#00ff88" radius="0.2" position="-2.0 1.5 -0.5" animation="property: scale; to: 1.5 1.5 1.5; dir: alternate; dur: 1000; loop: true"></a-sphere>
       </a-entity>

       <a-entity id="group8" visible="false">
         <a-torus color="#ff4b2b" radius="0.25" radius-tubular="0.05" position="-2.0 1.4 0" rotation="90 0 0"></a-torus>
       </a-entity>

       <a-entity id="group9" visible="false">
         <a-cone color="#00f2fe" radius-bottom="0.25" height="0.5" position="-2.0 1.5 0" rotation="180 0 0"></a-cone>
       </a-entity>

       <a-entity id="group10" visible="false">
         <a-image id="hand-image" src="#cpr-hands" position="-2.0 1.5 0" width="1.8" height="1.8" rotation="-90 0 0" animation="property: position; from: -2.0 1.5 0; to: -2.0 1.1 0; dur: 272.5; dir: alternate; loop: true; easing: easeInOutQuad; enabled: false"></a-image>
         <a-ring id="cpr-ring" color="#ff4b2b" radius-inner="0.35" radius-outer="0.45" position="-2.0 1.05 0" rotation="-90 0 0" animation="property: material.opacity; from: 1; to: 0.2; dur: 272.5; dir: alternate; loop: true"></a-ring>
       </a-entity>

       <a-entity id="group11" visible="false">
         <a-torus color="#ffeb3b" radius="0.2" radius-tubular="0.02" position="-2.0 1.5 -1" rotation="90 0 0" animation="property: rotation; to: 90 360 0; dur: 2000; loop: true"></a-torus>
       </a-entity>

       <a-entity id="group12" visible="false">
         <a-sphere color="#ff4b2b" radius="0.15" position="-2.0 1.6 -1" animation="property: scale; to: 1.2 1.2 1.2; dir: alternate; dur: 300; loop: true"></a-sphere>
       </a-entity>

       <a-entity id="group13" visible="false">
         <a-sphere color="#00f2fe" radius="0.3" position="-2.0 1.6 -1" opacity="0.5" animation="property: scale; from: 1 1 1; to: 1.5 1.5 1.5; dur: 1000; loop: true; dir: alternate"></a-sphere>
       </a-entity>
 
     </a-marker>
     <a-entity camera></a-entity>
   </a-scene>
 
   <script>
      let currentStep = 1;
      let count = 0;
      let timer = null;
      let isMarkerFound = false;
      let hasStartedSession = false;
      
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const synth = window.speechSynthesis;

      window.addEventListener('DOMContentLoaded', () => {
        const marker = document.querySelector('a-marker');
        marker.addEventListener('markerFound', () => {
          if (!isMarkerFound) {
            isMarkerFound = true;
            if (hasStartedSession && currentStep === 1) {
              speakText(voiceInstructions[0]);
            }
          }
        });
      });
 
      const shortTitles = [
        "AREA SAFE",
        "CALL OUT",
        "TAP SHOULDER",
        "HAND ON FOREHEAD",
        "LIFT CHIN",
        "CHEST MOVEMENT",
        "CHECK BREATHING",
        "HAND ON CHEST",
        "HAND ON TOP",
        "30 COMPRESSIONS",
        "TILT HEAD",
        "CLOSE NOSE",
        "2 RESCUE BREATHS"
      ];

      const voiceInstructions = [
        "Make sure the area is safe!",
        "Call out loudly: Are you okay?",
        "Tap the patient's shoulder gently!",
        "Place your hand on the forehead",
        "Lift the chin gently",
        "Look for chest movement",
        "Check for breathing for 10 seconds",
        "Place the heel of your hand on chest",
        "Place your other hand on top",
        "Push 30 times, 5 centimeters deep, at 100 per minute.",
        "Tilt the head back",
        "Close the nose",
        "Give 2 rescue breaths, 1 second each, until the chest rises"
      ];
 
      function beep(freq, duration) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
      }

      function speakText(text) {
        synth.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        utterance.rate = 1.0;
        synth.speak(utterance);
      }
 
      function initExperience() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        hasStartedSession = true;
        
        if (!isMarkerFound) {
          speakText("Please point the camera at the marker.");
        } else {
          speakText(voiceInstructions[0]);
        }
        
        document.getElementById('landing-page').style.opacity = '0';
        setTimeout(() => {
         document.getElementById('landing-page').style.display = 'none';
         document.getElementById('ar-ui').style.display = 'block';
         document.getElementById('sos-btn').style.display = 'block';
        }, 800);
      }
 
      function nextStep() {
        clearInterval(timer);
        document.getElementById('cpr-counter').style.display = 'none';
        document.getElementById('next-btn-text').style.display = 'block';
        document.getElementById('start-cpr-btn').style.display = 'none';
 
        if (currentStep < 13) {
         document.getElementById('group' + currentStep).setAttribute('visible', 'false');
         currentStep++;
         document.getElementById('group' + currentStep).setAttribute('visible', 'true');
 
          document.getElementById('step-num').innerText = `STEP ${currentStep} OF 13`;
         document.getElementById('short-title').innerText = shortTitles[currentStep - 1];
         speakText(voiceInstructions[currentStep - 1]);
         
         document.getElementById('progress-bar').style.width = (currentStep * 7.69) + '%';
          
          if (currentStep === 13) document.getElementById('next-btn-text').innerText = "FINISH ✓";
          
          if (currentStep === 10) {
            document.getElementById('next-btn-text').style.display = 'none';
            document.getElementById('start-cpr-btn').style.display = 'block';
          }
        } else {
         showFinishPage();
        }
      }
 
      function startCPR() {
        count = 0;
        const handImg = document.getElementById('hand-image');
        document.getElementById('cpr-counter').style.display = 'block';
        document.getElementById('cpr-counter').innerText = count;
        document.getElementById('start-cpr-btn').style.display = 'none';
        
        handImg.setAttribute('animation', 'enabled: true');
        
        timer = setInterval(() => {
          count++;
          if (count <= 30) {
            document.getElementById('cpr-counter').innerText = count;
            beep(950, 0.08); 
          } else {
            document.getElementById('cpr-counter').innerText = "DONE!";
            handImg.setAttribute('animation', 'enabled: false');
            clearInterval(timer);
            document.getElementById('next-btn-text').style.display = 'block';
            speakText("Compressions done. Proceed to next step.");
          }
        }, 545);
      }
 
      function showFinishPage() {
        document.getElementById('ar-ui').style.display = 'none';
        document.getElementById('sos-btn').style.display = 'none';
        const fp = document.getElementById('finish-page');
        fp.style.display = 'flex';
        setTimeout(() => { fp.style.opacity = '1'; }, 100);
        speakText("Mission Complete. Well done!");
      }
   </script>
  </body>
</html>
